version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: unilever_postgres
    restart: always
    environment:
      POSTGRES_DB: unilever_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  streamlit:
    build: .
    container_name: unilever_streamlit
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data: